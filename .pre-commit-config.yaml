# Family-standard pre-commit configuration for django-mvp repositories.
#
# The Python tools (ruff, mypy, deptry) run as *local* hooks inside the Poetry
# env, so their versions come from the mvp-shared[dev] bundle — one version
# source for the whole family, instead of per-repo `rev:` pins that drift under
# autoupdate. It also means `poetry run <tool>` behaves identically to the hook.
#
# black and pyupgrade are deliberately absent: `ruff format` is a drop-in black
# replacement, and ruff's UP rules cover pyupgrade (enable them in the repo's
# `[tool.ruff.lint]` select list).

exclude: "^docs/|/migrations/|^tests/"
default_stages: [pre-commit]

repos:

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: https://github.com/python-poetry/poetry
    rev: '2.3.4'
    hooks:
      - id: poetry-check
      - id: poetry-lock
        stages: [manual]  # Only run manually, not in CI

  # Local hooks that use the Poetry environment
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: poetry run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: poetry run ruff format
        language: system
        types: [python]
        require_serial: true
      - id: mypy
        name: mypy
        entry: poetry run mypy
        language: system
        # Without require_serial, pre-commit splits the file list into parallel
        # batches, and concurrent mypy processes race on the shared .mypy_cache —
        # INTERNAL ERROR on a cold cache. One serial invocation is also what
        # mirrors-mypy ships.
        require_serial: true
        types: [python]
        files: ^controlled_vocabularies/
      - id: deptry
        name: deptry
        entry: poetry run deptry .
        language: system
        pass_filenames: false
        always_run: true

# pre-commit.ci runs only the env-independent hooks; the local Poetry-env hooks
# run in each repo's own CI (the shared build workflow's Code Quality job).
ci:
  autoupdate_schedule: monthly
  skip: [poetry-lock, ruff, ruff-format, mypy, deptry]
  submodules: false
