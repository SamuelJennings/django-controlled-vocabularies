name: Tests

on:
  push:
    branches:
      - main
    paths:
      - 'controlled_vocabularies/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/tests.yml'
  # No paths filter on pull_request: these checks are ruleset-required, and a
  # path-filtered required check never reports on out-of-scope PRs, blocking merge.
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  call-tests:
    uses: django-mvp/shared/.github/workflows/tests.yml@v0.2.0
    with:
      coverage-package: controlled_vocabularies
      django-versions: '["5.2", "6.0"]'
      # test/lint tooling lives in the single (non-optional) dev group plus the
      # mvp-shared test extra; empty args install main + dev, which covers pytest.
      poetry-install-args: ''
    secrets: inherit
