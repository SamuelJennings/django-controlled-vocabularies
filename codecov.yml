# Coverage gating. 100% is brittle — it fails a PR over a single defensive
# branch or an unreachable guard. These targets keep the bar high while leaving
# headroom for normal work.
#
#   project — overall coverage floor for the whole package.
#   patch   — coverage required of the lines changed in a PR (new code).
#
# The 1% threshold absorbs rounding and small, justified dips.
coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 1%
    patch:
      default:
        target: 85%
        threshold: 1%
